<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Groove Menu</title>
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#7b937e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <!-- Tailwind CSS -->
    <script src="./tailwindcss.js"></script>

    <!-- Lucide Icons -->
    <script src="./lucide_icons.js"></script>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <!-- Google Fonts: Inter (Sans Serif) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDUtaq22wuKtAZHtcYnta_sXHNJWkEoAiQ",
            authDomain: "groove-menu.firebaseapp.com",
            projectId: "groove-menu",
            storageBucket: "groove-menu.firebasestorage.app",
            messagingSenderId: "622362545565",
            appId: "1:622362545565:web:7fc736c19970fd558c7374",
            measurementId: "G-D35FC0ZMDB"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Enable Firestore Persistence
        db.enablePersistence().catch((err) => {
            if (err.code == 'failed-precondition') {
                console.warn('Persistence failed: Multiple tabs open');
            } else if (err.code == 'unimplemented') {
                console.warn('Persistence failed: Browser not supported');
            }
        });

        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            DEFAULT: '#7b937e', // Logo color (Sage Green)
                            light: '#eef2ef',
                            accent: '#5f7561'
                        },
                        dark: '#111111',
                        surface: '#faf9f6' // Off-white background
                    },
                    fontFamily: {
                        'sans': ['Inter', 'sans-serif'],
                    },
                    boxShadow: {
                        'soft': '0 8px 30px rgba(0,0,0,0.04)',
                        'floating': '0 10px 40px rgba(0,0,0,0.1)'
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #faf9f6;
            -webkit-tap-highlight-color: transparent;
        }

        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Animations */
        .slide-up {
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .slide-up.active {
            transform: translateY(0);
        }

        @keyframes fade-in-up {
            from {
                opacity: 0;
                transform: translateY(15px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-item {
            animation: fade-in-up 0.5s ease-out forwards;
            opacity: 0;
        }
    </style>
</head>

<body class="font-sans text-dark antialiased bg-surface">

    <div id="loadingScreen" class="fixed inset-0 bg-surface z-[60] flex items-center justify-center">
        <img id="loadingLogo" src="./assets/logo.png" alt="Groove Logo" class="h-20 object-contain animate-pulse">
    </div>

    <!-- PWA Install Banner -->
    <div id="installBanner"
        class="fixed bottom-6 left-6 right-6 z-[80] bg-dark text-white p-5 rounded-3xl shadow-floating flex items-center justify-between gap-4 transform translate-y-32 transition-transform duration-500 max-w-md mx-auto">
        <div class="flex items-center gap-3">
            <div class="bg-brand rounded-2xl p-2">
                <img src="./assets/logo.png" class="h-8 w-8 object-contain">
            </div>
            <div>
                <h4 class="font-bold text-sm">Groove App</h4>
                <p class="text-[10px] text-gray-400">ثبت التطبيق لتجربة أسرع وأفضل</p>
            </div>
        </div>

            class="bg-brand text-white px-5 py-2 rounded-xl text-xs font-bold whitespace-nowrap">تثبيت</button>
    </div>

    <!-- Main App Container -->
    <div class="max-w-6xl mx-auto relative bg-surface min-h-screen shadow-2xl overflow-hidden flex flex-col">

        <!-- ================= HOME SCREEN ================= -->
        <div id="homeScreen" class="pb-32 bg-surface min-h-screen overflow-y-auto">

            <!-- Top App Bar -->
            <header class="py-5 px-6 flex justify-between items-center bg-surface sticky top-0 z-30">
                <button onclick="toggleSidebar(true)" class="p-2 -ml-2 text-dark w-10">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                        class="w-6 h-6">
                        <line x1="4" x2="20" y1="12" y2="12" />

                </button>
                <img id="mainLogo" src="./assets/logo.png" alt="Groove Logo" class="h-8 object-contain">
                <div class="w-10"></div>

            <!-- 1. Hero Carousel Section -->

            <!-- 2. Main Menu Section -->

                <!-- Categories Tabs -->

            <!-- 3. Special Offers -->

        </div>

        <!-- Floating Full Menu Button removed -->

        <!-- ================= SIDEBAR MENU ================= -->
        <div id="sidebarMenu" onclick="toggleSidebar(false)"
            class="fixed inset-0 bg-black/50 z-[70] opacity-0 pointer-events-none transition-opacity duration-300">
            <div id="sidebarContent" onclick="event.stopPropagation()"
                class="absolute top-0 left-0 w-[80%] max-w-[320px] h-full bg-surface shadow-2xl transform -translate-x-full transition-transform duration-300 flex flex-col">
                <div class="p-6 border-b border-gray-200 flex justify-between items-center">
                    <img src="./assets/logo.png" alt="Groove Logo" class="h-8 object-contain sidebar-logo">
                    <button onclick="toggleSidebar(false)"
                        class="p-2 bg-gray-100 rounded-full text-dark hover:bg-gray-200 transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"

                            <path d="M18 6 6 18" />
                            <path d="m6 6 12 12" />

                    </button>
                </div>
                <div class="flex-1 overflow-y-auto py-6 flex flex-col gap-2 px-4">
                    <button onclick="navigateTo('home')"

        <!-- ================= GENERIC PAGE OVERLAY ================= -->
        <div id="pageOverlay"
            class="fixed inset-0 bg-surface z-[60] flex flex-col slide-up max-w-6xl mx-auto shadow-2xl">
            <div class="flex justify-between items-center px-6 pt-10 pb-6 bg-surface shrink-0">
                <h2 id="pageTitle" class="text-4xl font-black tracking-tight text-dark">Page</h2>
                <button onclick="closePage()"
                    class="p-2.5 bg-gray-100 rounded-full text-dark hover:bg-gray-200 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                        class="w-5 h-5">

                        <path d="m6 6 12 12" />

                </button>
            </div>
            <div id="pageContent"
                class="flex-1 overflow-y-auto px-6 py-4 bg-surface text-gray-600 leading-relaxed font-sans text-[15px]">
                <!-- Content injected here -->
            </div>
        </div>

    </div>

    <script>
        // --- Data & State ---
        let itemsData = [];
        let categoriesData = [];
        let customCategoryOrder = [];
        let activeCategory = '';

        // --- Helper Function for Google Drive Links ---
        function getDirectDriveLink(url, isVideo = false) {
            if (!url) return '';
            const driveMatch = url.match(/(?:\/d\/|id=)([\w-]+)/);
            if (driveMatch && driveMatch[1]) {
                const fileId = driveMatch[1];
                if (isVideo) {
                    return `https://drive.google.com/uc?export=download&id=${fileId}`;
                }
                // The thumbnail endpoint is much more reliable for images in Google Drive
                return `https://drive.google.com/thumbnail?id=${fileId}&sz=w1200`;
            }
            return url;
        }

        function getImgProps(item) {
            const url = getDirectDriveLink(item.image);
            if (!url) return `src="https://via.placeholder.com/400?text=No+Image"`;
            return `src="${url}" onerror="this.onerror=null; this.src='https://via.placeholder.com/400?text=Error+Loading';"`;
        }

        // --- Fetch Data from Firebase ---
        async function fetchData() {
            try {
                // 1. Fetch App Settings (Logo, Carousel)
                db.collection('settings').doc('app').onSnapshot((doc) => {
                    if (doc.exists) {
                        const settings = doc.data();

                        // Update Logo
                        if (settings.logoUrl) {
                            const logoSrc = getDirectDriveLink(settings.logoUrl);
                            document.getElementById('loadingLogo').src = logoSrc;
                            document.getElementById('mainLogo').src = logoSrc;
                            document.querySelectorAll('.sidebar-logo').forEach(img => img.src = logoSrc);
                        }

                        // Update Carousel
                        if (settings.carousel && settings.carousel.length > 0) {
                            renderCarousel(settings.carousel);
                        } else {
                            document.getElementById('heroSection').classList.add('hidden');
                        }
                    }
                });

                // 2. Fetch Category Order
                db.collection('settings').doc('categories').onSnapshot((doc) => {
                    if (doc.exists) {
                        customCategoryOrder = doc.data().list || [];
                        renderCategories();
                    }
                });

                // 3. Fetch Menu Items
                db.collection('menu').onSnapshot((querySnapshot) => {
                    itemsData = [];
                    querySnapshot.forEach((doc) => {
                        itemsData.push({ id: doc.id, ...doc.data() });
                    });

                    // Sort items by 'order' field, then by name
                    itemsData.sort((a, b) => {
                        const orderA = parseInt(a.order) || 0;
                        const orderB = parseInt(b.order) || 0;
                        if (orderA !== orderB) return orderA - orderB;
                        return (a.name || '').localeCompare(b.name || '');
                    });

                    categoriesData = [...new Set(itemsData.map(item => item.category))].filter(Boolean);

                    // Sort categoriesData based on customCategoryOrder
                    categoriesData.sort((a, b) => {
                        const indexA = customCategoryOrder.indexOf(a);
                        const indexB = customCategoryOrder.indexOf(b);
                        if (indexA === -1 && indexB === -1) return a.localeCompare(b);
                        if (indexA === -1) return 1;
                        if (indexB === -1) return -1;
                        return indexA - indexB;
                    });
                    if (!activeCategory && categoriesData.length > 0) {
                        activeCategory = categoriesData[0];
                    }

                    renderTopSellers();
                    renderSpecialOffers();
                    renderCategories();
                    renderMenuItems();

                    // Hide loading screen
                    setTimeout(() => {
                        document.getElementById('loadingScreen').style.display = 'none';
                        lucide.createIcons();
                    }, 800);
                });

            } catch (error) {
                console.error("Error fetching data:", error);
                document.getElementById('loadingScreen').innerHTML = `
                    <div class="px-6 text-center flex flex-col items-center gap-4">
                        <p class="text-red-500 font-bold">Error connecting to Firebase.</p>
                        <p class="text-sm text-gray-500">Please check your configuration and internet connection.</p>
                    </div>`;
            }
        }

        // --- Render Functions ---

        function renderCarousel(mediaFiles) {
            const heroSection = document.getElementById('heroSection');
            const container = document.getElementById('heroCarouselContainer');

            heroSection.classList.remove('hidden');
            container.innerHTML = mediaFiles.map((media) => {
                const isVideo = media.type === 'video';
                const src = getDirectDriveLink(media.url, isVideo);
                return `
                    <div class="w-full shrink-0 snap-start bg-gray-100 relative overflow-hidden h-[450px]">
                        ${isVideo
                        ? `<video src="${src}" class="absolute inset-0 w-full h-full object-cover" autoplay loop muted playsinline></video>`
                        : `<img src="${src}" class="absolute inset-0 w-full h-full object-cover" alt="Hero Promo">`
                    }
                    </div>
                `;
            }).join('');
        }

        function renderTopSellers() {
            const topSellers = itemsData.filter(item => item.isTopSeller === true || item.isTopSeller === 'TRUE');
            if (topSellers.length === 0) {
                document.getElementById('topSellersSection').classList.add('hidden');
                return;
            }

            document.getElementById('topSellersSection').classList.remove('hidden');
            const container = document.getElementById('topSellersContainer');

            container.innerHTML = topSellers.map((item, index) => `
                <div class="w-44 shrink-0 flex flex-col bg-white rounded-3xl p-3 shadow-soft animate-item" style="animation-delay: ${index * 150}ms">
                    <div class="w-full h-40 rounded-[1.25rem] overflow-hidden bg-gray-50 mb-3">
                        <img ${getImgProps(item)} alt="${item.name}" class="w-full h-full object-cover" />
                    </div>
                    <div class="px-1">
                        <h3 class="font-bold text-lg leading-tight text-dark mb-1">${item.name}</h3>
                        <div class="font-sans text-sm text-gray-600 font-medium">$${item.price}</div>
                    </div>
                </div>
            `).join('');
        }

        function renderSpecialOffers() {
            const specialOffers = itemsData.filter(item => item.isSpecialOffer === true || item.isSpecialOffer === 'TRUE');
            if (specialOffers.length === 0) {
                document.getElementById('specialOffersSection').classList.add('hidden');
                return;
            }

            document.getElementById('specialOffersSection').classList.remove('hidden');
            const container = document.getElementById('specialOffersContainer');

            container.innerHTML = specialOffers.map((item, index) => `
                <div class="flex items-center gap-4 bg-white rounded-3xl p-3 shadow-soft relative animate-item" style="animation-delay: ${index * 200}ms">
                    <div class="w-20 h-20 rounded-2xl overflow-hidden bg-gray-50 shrink-0">
                        <img ${getImgProps(item)} alt="${item.name}" class="w-full h-full object-cover" />
                    </div>
                    <div class="flex flex-col flex-1 py-1 pr-16">
                        <h3 class="text-lg font-bold leading-none mb-1.5 text-dark">${item.name}</h3>
                        <p class="text-xs text-gray-500 leading-tight mb-2 line-clamp-1">${item.description || ''}</p>
                        <div class="flex items-center gap-2">
                            <span class="font-sans font-bold text-brand-accent">$${item.price}</span>
                            ${item.oldPrice ? `<span class="font-sans text-xs font-medium text-gray-400 line-through">$${item.oldPrice}</span>` : ''}
                        </div>
                    </div>
                    ${item.tag ? `
                        <div class="absolute right-4 top-1/2 -translate-y-1/2 bg-brand-light text-brand-accent text-[10px] font-bold px-2 py-1.5 rounded-full uppercase tracking-wide text-center leading-tight">
                            ${item.tag.replace(' ', '<br>')}
                        </div>
                    ` : ''}
                </div>
            `).join('');
        }

        function renderCategories() {
            const container = document.getElementById('categoriesContainer');
            container.innerHTML = categoriesData.map(category => `
                <button
                    onclick="changeCategory('${category}')"
                    class="whitespace-nowrap flex items-center gap-2 pb-4 text-[15px] font-sans transition-colors relative ${activeCategory === category
                    ? 'text-brand font-bold'
                    : 'text-gray-400 font-medium hover:text-gray-600'
                }"
                >
                    ${category}
                    ${activeCategory === category ? '<div class="absolute bottom-0 left-0 w-full h-[2px] bg-brand rounded-t-full"></div>' : ''}
                </button>
            `).join('');
        }

        function renderMenuItems() {
            const container = document.getElementById('menuItemsContainer');
            const filteredItems = itemsData.filter(item => item.category === activeCategory);

            if (filteredItems.length === 0) {
                container.innerHTML = '<div class="col-span-2 text-center text-gray-400 py-10 font-sans">No items found in this category.</div>';
                return;
            }

            container.innerHTML = filteredItems.map((item, index) => `
                <div class="flex flex-col gap-2 group cursor-pointer animate-item" style="animation-delay: ${index * 60}ms">
                    <div class="w-full aspect-square bg-gray-100 rounded-[1.5rem] relative overflow-hidden mb-1 shadow-sm">
                        <img ${getImgProps(item)} alt="${item.name}" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105" />
                        ${item.tag ? `
                            <span class="absolute top-3 right-3 bg-white/90 backdrop-blur text-brand-accent text-[10px] font-bold px-2.5 py-1 rounded-full uppercase tracking-wider">
                                ${item.tag}
                            </span>
                        ` : ''}
                    </div>
                    <div class="flex flex-col px-1">
                        <h3 class="text-lg font-bold leading-tight text-dark">${item.name}</h3>
                        ${item.description ? `<p class="text-sm text-gray-500 mt-1 line-clamp-2 leading-snug">${item.description}</p>` : ''}
                        <div class="text-base font-sans font-bold text-brand-accent mt-2">
                            $${item.price}
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // --- Interactivity ---

        function changeCategory(category) {
            activeCategory = category;
            renderCategories();
            renderMenuItems();
        }

        function scrollToMenu() {
            document.getElementById('mainMenuSection').scrollIntoView({ behavior: 'smooth' });
        }

        function toggleSidebar(isOpen) {
            const sidebar = document.getElementById('sidebarMenu');
            const content = document.getElementById('sidebarContent');
            if (isOpen) {
                sidebar.classList.remove('opacity-0', 'pointer-events-none');
                content.classList.remove('-translate-x-full');
            } else {
                sidebar.classList.add('opacity-0', 'pointer-events-none');
                content.classList.add('-translate-x-full');
            }
        }

        // --- Navigation & Pages ---

        const pagesData = {
            about: {
                title: "About Us",
                content: `<p class="mb-4">Welcome to Groove. We are a community-driven coffee shop dedicated to bringing you the finest seasonal blends and freshly baked pastries.</p>
                          <p class="mb-4">Founded in 2026, our mission is simple: <em class="text-dark font-medium">Made by friends for friends</em>. We believe that a great cup of coffee is the perfect catalyst for connection.</p>
                          <img src="https://images.unsplash.com/photo-1497935586351-b67a49e012bf?auto=format&fit=crop&q=80&w=800" class="rounded-[1.5rem] mt-6 w-full object-cover h-48 shadow-soft">`
            },
            location: {
                title: "Location",
                content: `<p class="mb-4">Visit us at our flagship store. We're open 7 days a week.</p>
                          <div class="bg-white shadow-soft p-5 rounded-[1.5rem] mb-4 border border-gray-100">
                            <strong class="text-dark block mb-2">Address:</strong>
                            Al-Azizieh, InFront on Pizzza House<br>
                            Aleppo, Syria
                          </div>
                          <div class="bg-white shadow-soft p-5 rounded-[1.5rem] border border-gray-100">
                            <strong class="text-dark block mb-2">Hours:</strong>
                            Daily: 10:00 AM - 12:00 AM (Midnight)
                          </div>
                          <a href="https://www.google.com/maps/search/?api=1&query=36.21131376103663,37.15256332574845" target="_blank" class="w-full bg-brand text-white font-bold py-4 rounded-[1.5rem] flex items-center justify-center gap-2 shadow-soft hover:bg-brand-accent transition-colors">
                            <i data-lucide="map" class="w-5 h-5"></i>
                            Open in Google Maps
                          </a>`
            },
            contact: {
                title: "Contact",
                content: `<p class="mb-6">We'd love to hear from you! Reach out for reservations, catering, or just to say hi.</p>
                          <div class="bg-white shadow-soft p-5 rounded-[1.5rem] mb-6 border border-gray-100 flex flex-col gap-3">
                              <p class="flex items-center gap-3"><i data-lucide="mail" class="w-5 h-5 text-brand"></i> <span class="text-dark font-medium">groovealeppo@gmail.com</span></p>
                              <div class="h-px bg-gray-100 w-full"></div>
                              <p class="flex items-center gap-3"><i data-lucide="phone" class="w-5 h-5 text-brand"></i> <span class="text-dark font-medium ltr">+963 999 999 999</span></p>
                          </div>
                          <h3 class="text-dark font-bold mb-4">Follow Us</h3>
                          <div class="flex gap-4">
                              <a href="#" class="p-3 bg-white shadow-soft border border-gray-100 rounded-full text-brand hover:bg-brand-light transition-colors"><i data-lucide="instagram" class="w-6 h-6"></i></a>
                              <a href="#" class="p-3 bg-white shadow-soft border border-gray-100 rounded-full text-brand hover:bg-brand-light transition-colors"><i data-lucide="twitter" class="w-6 h-6"></i></a>
                              <a href="#" class="p-3 bg-white shadow-soft border border-gray-100 rounded-full text-brand hover:bg-brand-light transition-colors"><i data-lucide="facebook" class="w-6 h-6"></i></a>
                          </div>`
            }
        };

        function navigateTo(page) {
            toggleSidebar(false);
            if (page === 'home') {
                closePage();
            } else {
                document.getElementById('pageTitle').innerText = pagesData[page].title;
                document.getElementById('pageContent').innerHTML = pagesData[page].content;
                document.getElementById('pageOverlay').classList.add('active');
                lucide.createIcons();
            }
        }

        function closePage() {
            document.getElementById('pageOverlay').classList.remove('active');
        }

        // Initialize App
        window.onload = () => {
            fetchData();

            // Register Service Worker for PWA
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('./service-worker.js')
                    .then(() => console.log('Service Worker Registered'));
            }
        };

        // PWA Install Logic
        let deferredPrompt;
        const installBanner = document.getElementById('installBanner');
        const installBtn = document.getElementById('installBtn');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installBanner.classList.remove('translate-y-32');
        });

        installBtn.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    installBanner.classList.add('translate-y-32');
                }
                deferredPrompt = null;
            }
        });

    </script>
</body>

</html>
